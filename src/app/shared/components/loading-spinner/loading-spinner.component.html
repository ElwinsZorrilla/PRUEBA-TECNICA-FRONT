@if (isLoading()) {
  <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 9999">
    <mat-card style="padding: 32px; text-align: center; border-radius: 12px; min-width: 160px">
      <mat-spinner diameter="40" color="primary" style="margin: 0 auto" />
      <p class="mat-body-2" style="margin: 16px 0 0; color: rgba(0,0,0,0.6)">Cargando...</p>
    </mat-card>
  </div>
}
